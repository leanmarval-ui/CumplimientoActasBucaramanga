name: Procesar reuniones proyectos

on:
  push:
    paths:
      - "input/Reuniones.xlsx"
  workflow_dispatch:

concurrency:
  group: actualizacion-repo
  cancel-in-progress: false

jobs:
  procesar:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          pip install pandas numpy openpyxl matplotlib

      # =========================
      # 🔥 LIMPIAR OUTPUT (CLAVE)
      # =========================
      - name: Limpiar carpeta output
        run: |
          rm -rf output
          mkdir output

      # =========================
      # 🔥 GENERAR ARCHIVOS
      # =========================
      - name: Ejecutar main (genera gráfica)
        run: python scripts/main.py

      - name: Generar JSON (detalle.json)
        run: python scripts/generar_json.py

      # =========================
      # 📦 DEBUG (MUY IMPORTANTE)
      # =========================
      - name: Verificar archivos generados
        run: |
          echo "Contenido carpeta output:"
          ls -la output

      # =========================
      # 🚀 COMMIT SEGURO
      # =========================
      - name: Commit y push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add output/*

          git diff --cached --quiet || git commit -m "Actualizar outputs y JSON"

          git pull origin main --rebase || true
          git push origin main || true
