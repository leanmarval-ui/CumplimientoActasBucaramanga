<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Cumplimiento</title>

<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        background-color: #f4f6f8;
    }

    /* SPLASH */
    #splash {
        position: fixed;
        width: 100%;
        height: 100%;
        background: #2c3e50;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 28px;
        z-index: 999;
    }

    .contenido {
        padding: 20px;
        display: none;
    }

    h1 {
        text-align: center;
    }

    /* CARDS */
    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
        gap: 20px;
    }

    .card {
        background: white;
        padding: 10px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        text-align: center;
    }

    img {
        width: 100%;
        border-radius: 8px;
    }

    /* TABLA */
    table {
        margin: auto;
        border-collapse: collapse;
        background: white;
        width: 90%;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    th {
        background: #2c3e50;
        color: white;
        padding: 8px;
    }

    td {
        padding: 6px;
        text-align: center;
    }
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
    🚀 Bienvenido al Dashboard de Cumplimiento
</div>

<div class="contenido" id="contenido">

<h1>📊 Cumplimiento de Actas - Marzo 2026</h1>

<div class="grid">
    <div class="card">
        <h2>Bucaramanga</h2>
        <img src="https://leanmarval-ui.github.io/CumplimientoActasBucaramanga/output/grafico.png">
    </div>
</div>

<!-- TABLA -->
<div id="tabla-container" style="margin-top:40px;"></div>

</div>

<script>
    // SPLASH
    setTimeout(() => {
        document.getElementById("splash").style.display = "none";
        document.getElementById("contenido").style.display = "block";
    }, 2000);
</script>

<script>
fetch('https://leanmarval-ui.github.io/CumplimientoActasBucaramanga/output/detalle.json')
    .then(response => response.json())
    .then(data => {

        let filtrado = data.filter(d => d.sucursal === "Bucaramanga");

        let html = `
        <table>
            <tr>
                <th>Proyecto</th>
                <th>Tipo</th>
                <th>Día</th>
                <th>Posible</th>
                <th>Real</th>
                <th>Coincidencias</th>
                <th>Conteo</th>
                <th>Cumplimiento</th>
            </tr>
        `;

        filtrado.forEach(row => {
            let valor = row.cumplimiento * 100;
            let color = valor >= 90 ? "#27ae60" : valor >= 80 ? "#f1c40f" : "#c0392b";

            html += `
            <tr>
                <td>${row.proyecto}</td>
                <td>${row.tipo}</td>
                <td>${row.dia}</td>
                <td>${row.posible}</td>
                <td>${row.real}</td>
                <td>${row.coincidencias}</td>
                <td>${row.conteo}</td>
                <td style="color:${color}; font-weight:bold;">
                    ${valor.toFixed(0)}%
                </td>
            </tr>
            `;
        });

        html += "</table>";

        document.getElementById("tabla-container").innerHTML = html;
    })
    .catch(error => {
        console.error("Error cargando JSON:", error);
    });
</script>

</body>
</html>
