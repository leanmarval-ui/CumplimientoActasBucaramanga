<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Cumplimiento de Actas</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f4f6f8;
        margin: 0;
        padding: 20px;
    }

    h1 {
        text-align: center;
        color: #333;
        margin-bottom: 40px;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
        gap: 30px;
    }

    .card {
        background: white;
        padding: 15px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h2 {
        text-align: center;
        color: #444;
    }

    img {
        width: 100%;
        margin-top: 10px;
        border-radius: 8px;
    }
</style>

</head>
<body>

<h1>📊 Cumplimiento de Actas - Marzo 2026</h1>

<div class="grid">

    <div class="card">
        <h2>Bogotá</h2>
        <img src="https://leanmarval-ui.github.io/CumplimientoActasBogota/output/grafico.png">
    </div>

    <div class="card">
        <h2>Bucaramanga</h2>
        <img src="https://leanmarval-ui.github.io/CumplimientoActasBucaramanga/output/grafico.png">
    </div>

    <div class="card">
        <h2>Costa</h2>
        <img src="https://leanmarval-ui.github.io/CumplimientoActasCosta/output/grafico.png">
    </div>

    <div class="card">
        <h2>Cali</h2>
        <img src="https://leanmarval-ui.github.io/CumplimientoActasCali/output/grafico.png">
    </div>

</div>

</body>
</html>
